<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AccessibleU — Understand the ADA & Section 508</title>
    <meta
      name="description"
      content="A plain-language guide to U.S. ADA and Section 508 digital-accessibility requirements, with a transcript-first voice assistant."
    />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <!--
      Pre-paint theme: set data-theme BEFORE first paint to prevent a
      flash-of-wrong-theme. Mirrors the ThemeProvider logic. Default: System.
    -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('a508-theme') || 'system';
          var sys = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.dataset.theme = m === 'system' ? sys : m;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
